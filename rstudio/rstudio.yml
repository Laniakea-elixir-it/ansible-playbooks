---
- hosts: "{{ target_hosts | default('default') }}"
  become_user: root
  become: true

  pre_tasks:
    - name: Enable EPEL
      dnf:
        name:
          - epel-release
        state: present
    - name: Install Packages for Rocky Linux
      dnf:
        name:
          - hdf5-devel
        state: present

  roles:
    - role: ansible-role-laniakea-rstudio
      become: yes
